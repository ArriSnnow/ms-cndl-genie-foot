<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Génie Foot — MS CNDL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --panel-2:#f8f9fa;
    --line:#e8eaed;
    --line-2:#dadce0;
    --ink:#202124;
    --muted:#5f6368;
    --muted-2:#80868b;
    --accent:#1a7a45;
    --win:#1e8e3e;
    --draw:#9aa0a6;
    --loss:#d93025;
    --radius:12px;
    --maxw:1060px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45;min-height:100vh}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}

  /* ---------- Header ---------- */
  header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .header-inner{max-width:var(--maxw);margin:0 auto;padding:16px 24px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:16px;min-width:0}

  /* === LOGO : enregistrez votre logo sous "logo.png" dans le même dossier
       que index.html — il s'affichera ici automatiquement. === */
  .brand-logo{flex:none;display:flex;align-items:center}
  .brand-logo img{height:52px;width:auto;max-width:200px;object-fit:contain;display:block}
  .logo-fallback{display:none;height:52px;min-width:52px;padding:0 12px;border-radius:12px;background:var(--panel-2);color:var(--muted);font-weight:800;font-size:1rem;align-items:center;justify-content:center;border:1px dashed var(--line-2)}

  .brand-text{min-width:0;line-height:1.15}
  .brand-text h1{font-size:1.7rem;font-weight:700;letter-spacing:-.02em;color:var(--ink)}
  .brand-text .sub{font-size:.8rem;color:var(--muted);margin-top:2px}

  nav.tabs{display:flex;gap:10px;margin-left:auto;overflow-x:auto;padding:2px}
  nav.tabs button{font-family:inherit;font-size:.92rem;font-weight:500;color:#3c4043;background:var(--panel-2);border:1px solid transparent;border-radius:999px;padding:9px 20px;cursor:pointer;white-space:nowrap;transition:background .12s,border-color .12s}
  nav.tabs button:hover{background:#eceef0}
  nav.tabs button.active{background:#fff;border-color:#747775;color:var(--ink);font-weight:600}
  nav.tabs button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  main{padding:30px 0 70px}
  .page{display:none;animation:fade .3s ease both}
  .page.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

  .section-title{font-size:1.6rem;font-weight:700;letter-spacing:-.01em;margin-bottom:18px;color:var(--ink)}

  /* ---------- Season / info bar ---------- */
  .season-bar{background:var(--panel-2);border-radius:var(--radius);padding:16px 22px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .season-bar .sb-label{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:2px}
  .season-bar .sb-value{font-size:1.05rem;font-weight:700;color:var(--ink)}
  .season-bar .sb-leader{font-size:.9rem;color:var(--muted)}
  .season-bar .sb-leader b{color:var(--ink);font-weight:700}

  /* ---------- Table ---------- */
  .tbl-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:600px}
  thead th{font-size:.82rem;font-weight:400;color:var(--muted);text-align:center;padding:12px 10px;border-bottom:1px solid var(--line)}
  thead th.lft{text-align:left;padding-left:8px}
  thead th.pts-h{font-weight:700;color:var(--ink)}
  tbody td{padding:14px 10px;text-align:center;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums;font-size:1rem;color:var(--ink)}
  tbody tr:last-child td{border-bottom:0}
  td.player{text-align:left;padding-left:8px}
  .player-cell{display:flex;align-items:center;gap:14px}
  .rk{width:16px;text-align:center;color:var(--muted);font-size:.95rem;flex:none}
  .avatar{width:30px;height:30px;border-radius:50%;flex:none;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);display:grid;place-items:center;font-weight:700;font-size:.82rem}
  .pname{font-weight:500;font-size:1rem;color:var(--ink)}
  tr.top1 .pname{font-weight:700}
  .pts-cell{font-weight:700;font-size:1rem;color:var(--ink)}
  td.gd.pos-v{color:var(--win)}
  td.gd.neg-v{color:var(--loss)}
  .form{display:flex;gap:6px;justify-content:center}
  .fdot{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:.72rem;font-weight:700;color:#fff;line-height:1}
  .fdot.W{background:var(--win)}
  .fdot.D{background:var(--draw)}
  .fdot.L{background:var(--loss)}
  .legend{display:flex;gap:18px;flex-wrap:wrap;align-items:center;color:var(--muted);font-size:.8rem;margin-top:16px;padding-left:2px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend .fdot{width:16px;height:16px;font-size:.55rem}

  /* ---------- Results ---------- */
  .filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:22px}
  .filter-bar input,.filter-bar select{font-family:inherit;font-size:.9rem;color:var(--ink);background:#fff;border:1px solid var(--line-2);border-radius:8px;padding:10px 13px}
  .filter-bar input{flex:1;min-width:180px}
  .filter-bar input::placeholder{color:var(--muted-2)}
  .filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:var(--accent)}
  .count{color:var(--muted);font-size:.82rem;margin-left:auto;font-variant-numeric:tabular-nums}
  .matches{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
  .match{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;transition:border-color .12s}
  .match:hover{border-color:var(--line-2)}
  .side{display:flex;align-items:center;gap:8px;min-width:0}
  .side.home{justify-content:flex-end;text-align:right}
  .side .nm{font-weight:400;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
  .side.winner .nm{color:var(--ink);font-weight:700}
  .scoreline{font-weight:700;font-size:1.15rem;font-variant-numeric:tabular-nums;color:var(--ink);background:var(--panel-2);border-radius:8px;padding:5px 12px;white-space:nowrap}
  .scoreline .vs{color:var(--muted-2);font-size:.78rem;margin:0 5px;font-weight:500}
  .empty{text-align:center;color:var(--muted);padding:50px 0;font-size:.95rem}

  /* ---------- Stats ---------- */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
  .stat-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px}
  .stat-card h3{font-size:.74rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .stat-card h3 svg{width:15px;height:15px;color:var(--muted-2)}
  .lead-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
  .lead-row:last-child{border-bottom:0;padding-bottom:0}
  .lead-row:first-of-type{padding-top:0}
  .lead-row .r{font-weight:700;color:var(--muted-2);width:16px;font-size:.85rem}
  .lead-row .nm{font-weight:500;flex:1}
  .lead-row .val{font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink)}
  .highlight-card{background:var(--panel-2);border-color:transparent}
  .big-stat{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .big-stat .num{font-weight:800;font-size:2.3rem;color:var(--ink);line-height:1;font-variant-numeric:tabular-nums}
  .big-stat .unit{color:var(--muted);font-size:.85rem}
  .big-desc{color:var(--muted);font-size:.88rem}
  .big-desc b{color:var(--ink);font-weight:600}
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:22px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;text-align:center}
  .kpi .v{font-weight:800;font-size:1.8rem;line-height:1;font-variant-numeric:tabular-nums;color:var(--ink)}
  .kpi .k{font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-2);margin-top:8px;font-weight:500}

  footer{border-top:1px solid var(--line);padding:24px 0;color:var(--muted-2);font-size:.78rem;text-align:center;margin-top:10px}
  footer b{color:var(--muted)}
  footer .fbrand{font-weight:700;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;font-size:.72rem;margin-bottom:6px}

  @media(max-width:620px){
    .brand-text h1{font-size:1.35rem}
    .section-title{font-size:1.35rem}
    nav.tabs{margin-left:0;width:100%}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-logo">
        <img src="logo.png" alt="Logo MS CNDL"
             onerror="this.style.display='none';document.getElementById('logoFallback').style.display='flex';" />
        <span class="logo-fallback" id="logoFallback">MS&nbsp;CNDL</span>
      </div>
      <div class="brand-text">
        <h1>Génie Foot</h1>
        <div class="sub">MS CNDL · Quiz Coupe du Monde</div>
      </div>
    </div>
    <nav class="tabs" role="tablist">
      <button class="active" data-tab="ranking" role="tab">Classement</button>
      <button data-tab="results" role="tab">Duels</button>
      <button data-tab="stats" role="tab">Stats</button>
    </nav>
  </div>
</header>

<main class="wrap">
  <!-- CLASSEMENT -->
  <section class="page active" id="ranking">
    <h2 class="section-title">Classement</h2>
    <div class="season-bar">
      <div>
        <div class="sb-label">Saison</div>
        <div class="sb-value" id="seasonValue">2026 · Histoire de la Coupe du Monde</div>
      </div>
      <div class="sb-leader" id="sbLeader"></div>
    </div>
    <div class="tbl-scroll">
      <table id="standings">
        <thead>
          <tr>
            <th class="lft"># Joueur</th>
            <th title="Duels joués">J</th>
            <th title="Victoires">V</th>
            <th title="Nuls">N</th>
            <th title="Défaites">D</th>
            <th title="Points marqués">pm</th>
            <th title="Points encaissés">pe</th>
            <th title="Différence">Diff</th>
            <th class="pts-h">Pts</th>
            <th>5 derniers</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <!-- DUELS -->
  <section class="page" id="results">
    <h2 class="section-title">Duels</h2>
    <div class="filter-bar">
      <input type="text" id="search" placeholder="Rechercher un joueur…" aria-label="Rechercher un joueur" />
      <select id="playerFilter" aria-label="Filtrer par joueur">
        <option value="">Tous les joueurs</option>
      </select>
      <span class="count" id="resultCount"></span>
    </div>
    <div class="matches" id="matchList"></div>
    <div class="empty" id="noResults" style="display:none">Aucun duel pour ce filtre.</div>
  </section>

  <!-- STATS -->
  <section class="page" id="stats">
    <h2 class="section-title">Stats</h2>
    <div class="stat-grid" id="statGrid"></div>
  </section>
</main>

<footer class="wrap">
  <div class="fbrand">MS CNDL — Magazine Sport CNDL</div>
</footer>

<script>
/* =========================================================
   À MODIFIER : nom du concours, saison + résultats des duels.
   Chaque duel : ["Joueur A", scoreA, scoreB, "Joueur B"]
   Le score = nombre de bonnes réponses dans le duel.
   Le classement, la forme et les stats se calculent tout seuls.
   ========================================================= */
const CONTEST = "Génie Foot";
const SEASON  = "2026 · Histoire de la Coupe du Monde";

const DUELS = [
  ["Meuse",4,0,"Marion"],
  ["Meuse",2,3,"Djinaud"],
  ["Samy",4,1,"Djinaud"],
  ["Samy",1,4,"Nexon"],
  ["Kopel",3,5,"Nexon"],
  ["Lovensky",1,3,"Nexon"],
  ["Kopel",3,3,"T-End"],
  ["Romuald",2,3,"Guyton"],
  ["Meuse",1,1,"Guyton"],
  ["T-End",0,1,"Meuse"],
  ["Lovensky",1,2,"Meuse"],
  ["Lovensky",2,2,"Marion"],
  ["Leonord",1,2,"Marion"],
  ["Leonord",2,2,"Wolfvens"],
  ["Lovensky",1,3,"Nexon"],
  ["Alzé",1,1,"Wolfvens"],
  ["Alzé",1,2,"T-End"],
  ["Djinaud",2,0,"Kemar"],
  ["Romuald",1,4,"Djinaud"],
  ["Romuald",1,2,"Kemar"],
  ["Meuse",2,2,"Kemar"],
  ["Djinaud",2,1,"Lovensky"],
  ["Kemar",1,0,"Kopel"],
  ["Meuse",0,2,"Romuald"],
  ["Lovensky",3,1,"Romuald"],
  ["Lovensky",1,1,"Kemar"],
  ["Nexon",2,3,"Meuse"],
  ["Guyton",3,2,"Lovensky"],
  ["Nexon",1,3,"T-End"],
  ["Nexon",0,3,"Guyton"],
  ["T-End",3,1,"Guyton"],
  ["T-End",0,3,"Djinaud"],
  ["Alzé",2,3,"Lovensky"],
  ["Alzé",4,1,"Samy"],
  ["Lovensky",3,1,"Samy"],
  ["Wolfvens",3,5,"Samy"],
  ["Wolfvens",2,3,"Lovensky"],
  ["Samy",2,1,"Meuse"],
];

/* ---------- classement (un seul passage, ordre chronologique) ---------- */
const FSYM = {W:"✓", D:"–", L:"✕"};
function blank(){return{P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0,form:[]};}
const S = {};
DUELS.forEach(([h,hs,as_,a])=>{
  S[h]=S[h]||blank(); S[a]=S[a]||blank();
  S[h].P++; S[a].P++;
  S[h].GF+=hs; S[h].GA+=as_; S[a].GF+=as_; S[a].GA+=hs;
  if(hs>as_){ S[h].W++; S[a].L++; S[h].Pts+=3; S[h].form.push("W"); S[a].form.push("L"); }
  else if(as_>hs){ S[a].W++; S[h].L++; S[a].Pts+=3; S[a].form.push("W"); S[h].form.push("L"); }
  else{ S[h].D++; S[a].D++; S[h].Pts++; S[a].Pts++; S[h].form.push("D"); S[a].form.push("D"); }
});
const TABLE = Object.entries(S).map(([name,d])=>({name,...d,GD:d.GF-d.GA}))
  .sort((x,y)=> y.Pts-x.Pts || y.GD-x.GD || y.GF-x.GF || x.name.localeCompare(y.name));

/* ---------- en-tête / pied / saison ---------- */
document.title = CONTEST + " — MS CNDL";
document.getElementById("seasonValue").textContent = SEASON;
(function(){
  const L = TABLE[0];
  const gap = TABLE[1] ? L.Pts - TABLE[1].Pts : 0;
  const tail = gap>0 ? ` (+${gap})` : "";
  document.getElementById("sbLeader").innerHTML = `Leader : <b>${L.name}</b> · ${L.Pts} pts${tail}`;
})();

/* ---------- tableau classement ---------- */
(function(){
  const tb = document.querySelector("#standings tbody");
  tb.innerHTML = TABLE.map((p,i)=>{
    const cls = i===0 ? "top1" : "";
    const form = p.form.slice(-5).map(r=>`<span class="fdot ${r}">${FSYM[r]}</span>`).join("");
    const gdCls = p.GD>0?"pos-v":(p.GD<0?"neg-v":"");
    return `<tr class="${cls}">
      <td class="player"><div class="player-cell"><span class="rk">${i+1}</span><span class="avatar">${p.name.charAt(0)}</span><span class="pname">${p.name}</span></div></td>
      <td>${p.P}</td><td>${p.W}</td><td>${p.D}</td><td>${p.L}</td>
      <td>${p.GF}</td><td>${p.GA}</td>
      <td class="gd ${gdCls}">${p.GD>0?"+":""}${p.GD}</td>
      <td class="pts-cell">${p.Pts}</td>
      <td><div class="form">${form}</div></td>
    </tr>`;
  }).join("");
})();

/* ---------- duels ---------- */
const matchListEl = document.getElementById("matchList");
const searchEl = document.getElementById("search");
const filterEl = document.getElementById("playerFilter");
const countEl = document.getElementById("resultCount");
const noResEl = document.getElementById("noResults");

TABLE.map(p=>p.name).sort().forEach(n=>{
  const o=document.createElement("option");o.value=n;o.textContent=n;filterEl.appendChild(o);
});

function matchCard([h,hs,as_,a]){
  const draw = hs===as_, homeWin = hs>as_, awayWin = as_>hs;
  return `<div class="match">
    <div class="side home ${homeWin?'winner':''}"><span class="nm">${h}</span></div>
    <div class="scoreline">${hs}<span class="vs">–</span>${as_}</div>
    <div class="side away ${awayWin?'winner':''}"><span class="nm">${a}</span></div>
  </div>`;
}
function renderResults(){
  const q = searchEl.value.trim().toLowerCase();
  const f = filterEl.value;
  const shown = DUELS.filter(([h,,,a])=>{
    const mp = !f || h===f || a===f;
    const ms = !q || h.toLowerCase().includes(q) || a.toLowerCase().includes(q);
    return mp && ms;
  });
  matchListEl.innerHTML = shown.map(matchCard).join("");
  countEl.textContent = `${shown.length} duels sur ${DUELS.length}`;
  noResEl.style.display = shown.length ? "none" : "block";
}
searchEl.addEventListener("input",renderResults);
filterEl.addEventListener("change",renderResults);
renderResults();

/* ---------- stats ---------- */
(function(){
  function board(title,icon,arr,fmt){
    const rows = arr.slice(0,5).map((p,i)=>`
      <div class="lead-row"><span class="r">${i+1}</span><span class="nm">${p.name}</span><span class="val">${fmt(p)}</span></div>`).join("");
    return `<div class="stat-card"><h3>${icon} ${title}</h3>${rows}</div>`;
  }
  const ICON = {
    star:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 3l2.5 5.5L20 9l-4 4 1 6-5-3-5 3 1-6-4-4 5.5-.5z"/></svg>',
    trophy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 4h12v4a6 6 0 01-12 0z"/><path d="M6 6H3v2a3 3 0 003 3M18 6h3v2a3 3 0 01-3 3M9 18h6M10 21h4M12 16v2"/></svg>',
    shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 3l8 3v5c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"/></svg>',
    bolt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M13 2L4 14h6l-1 8 9-12h-6z"/></svg>',
  };

  const byPts = [...TABLE].sort((a,b)=>b.GF-a.GF||a.GA-b.GA);
  const byWins = [...TABLE].sort((a,b)=>b.W-a.W||b.GD-a.GD);
  const byPct = [...TABLE].filter(p=>p.P>=3).sort((a,b)=>(b.W/b.P)-(a.W/a.P)||b.W-a.W);

  let bigWin=DUELS[0], hi=DUELS[0];
  DUELS.forEach(m=>{
    if(Math.abs(m[1]-m[2])>Math.abs(bigWin[1]-bigWin[2])) bigWin=m;
    if((m[1]+m[2])>(hi[1]+hi[2])) hi=m;
  });
  const bwW = bigWin[1]>bigWin[2]?bigWin[0]:bigWin[3];
  const bwL = bigWin[1]>bigWin[2]?bigWin[3]:bigWin[0];

  document.getElementById("statGrid").innerHTML =
    board("Meilleurs scoreurs", ICON.star, byPts, p=>p.GF) +
    board("Plus de victoires", ICON.trophy, byWins, p=>p.W) +
    board("Taux de victoires", ICON.bolt, byPct, p=>Math.round(p.W/p.P*100)+"%") +
    `<div class="stat-card highlight-card"><h3>${ICON.trophy} Plus large victoire</h3>
      <div class="big-stat"><span class="num">${Math.max(bigWin[1],bigWin[2])}–${Math.min(bigWin[1],bigWin[2])}</span></div>
      <div class="big-desc"><b>${bwW}</b> a battu <b>${bwL}</b> de ${Math.abs(bigWin[1]-bigWin[2])} points.</div></div>` +
    `<div class="stat-card highlight-card"><h3>${ICON.bolt} Duel le plus prolifique</h3>
      <div class="big-stat"><span class="num">${hi[1]+hi[2]}</span><span class="unit">points</span></div>
      <div class="big-desc"><b>${hi[0]}</b> ${hi[1]}–${hi[2]} <b>${hi[3]}</b></div></div>`;
})();

/* ---------- onglets ---------- */
document.querySelectorAll("nav.tabs button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.tab).classList.add("active");
    window.scrollTo({top:0,behavior:"smooth"});
  });
});
</script>
</body>
</html>
